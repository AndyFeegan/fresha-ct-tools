<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresha &#8212; Industry Resource Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fresha-dark: #1a1a2e;
    --fresha-accent: #6c5ce7;
    --fresha-accent-light: #a29bfe;
    --fresha-accent-bg: #ede9fe;
    --fresha-bg: #f4f3f8;
    --surface: #FFFFFF;
    --surface-hover: #FAFAF8;
    --ink: #1A1A1A;
    --ink-muted: #636e72;
    --ink-faint: #A39E98;
    --border: #dfe6e9;
    --tag-bg: #ede9fe;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #e8856c 0%, #d964a7 18%, #c86dd1 35%, #a678e0 50%, #8b7ae8 65%, #7b8eef 80%, #5cc0c8 100%);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    background: #0a0a0f;
    background-image: radial-gradient(ellipse at 50% 100%, rgba(108, 92, 231, 0.35) 0%, transparent 60%);
    padding: 28px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    background: #3b2d8b;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 8px;
    margin-right: 14px;
    box-shadow: 0 2px 8px rgba(59, 45, 139, 0.4);
  }

  .header-title-wrap {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .header h1 span {
    color: var(--fresha-accent-light);
    font-weight: 600;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.5);
  }

  .search-input {
    width: 100%;
    padding: 10px 16px 10px 42px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 40px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .search-input::placeholder { color: rgba(255,255,255,0.5); }
  .search-input:focus {
    background: rgba(255,255,255,0.18);
    border-color: rgba(108, 92, 231, 0.6);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
  }

  .stats-bar strong { color: #fff; font-weight: 600; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px 60px;
  }

  /* Industry Grid */
  .industry-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }

  .industry-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .industry-card:hover {
    border-color: var(--fresha-accent-light);
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  .industry-card.active {
    border-color: var(--fresha-accent);
    background: var(--fresha-accent-bg);
    box-shadow: 0 4px 24px rgba(108, 92, 231, 0.15);
  }

  .industry-card.active .card-icon {
    background: var(--fresha-accent);
    color: #fff;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--tag-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .card-title {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.3;
  }

  .card-meta {
    font-size: 12px;
    color: var(--ink-muted);
    display: flex;
    gap: 12px;
  }

  .card-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Detail Panel */
  .detail-panel {
    display: none;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }

  .detail-panel.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    padding: 24px 28px;
    background: #0a0a0f;
    background-image: radial-gradient(ellipse at 50% 100%, rgba(108, 92, 231, 0.35) 0%, transparent 60%);
    color: #fff;
  }

  .detail-header h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .detail-header p {
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
  }

  .detail-body { padding: 24px 28px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--fresha-accent);
    margin-bottom: 12px;
  }

  .resource-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .resource-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--fresha-bg);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }

  .resource-item:hover {
    border-color: var(--fresha-accent-light);
    background: var(--fresha-accent-bg);
  }

  .resource-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .resource-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .resource-note {
    font-size: 12px;
    color: var(--ink-muted);
    line-height: 1.4;
  }

  .resource-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }

  .tag-essential { background: #FDECEA; color: #C62828; }
  .tag-common { background: #FFF3E0; color: #E65100; }
  .tag-optional { background: #ede9fe; color: #5b21b6; }

  .talk-track {
    background: linear-gradient(135deg, #ede9fe, #e0d4fc);
    border: 1px solid rgba(108, 92, 231, 0.2);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-top: 4px;
  }

  .talk-track h4 {
    font-size: 13px;
    font-weight: 700;
    color: #5b21b6;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .talk-track p {
    font-size: 13px;
    color: #4c1d95;
    line-height: 1.6;
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-muted);
  }

  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; margin-bottom: 4px; color: var(--ink); }
  .empty-state p { font-size: 14px; }

  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-muted);
  }

  .close-btn {
    float: right;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .close-btn:hover { background: rgba(108, 92, 231, 0.4); }

  .fresha-footer {
    text-align: center;
    padding: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }

  @media (max-width: 640px) {
    .header { padding: 20px 16px; }
    .header-inner { flex-direction: column; align-items: flex-start; }
    .search-wrap { max-width: 100%; }
    .container { padding: 20px 16px 40px; }
    .industry-grid { grid-template-columns: 1fr; }
    .resource-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

let activeIndustry = null;

function getTotalResources() {
  return DATA.reduce((sum, ind) => sum + ind.resources.length, 0);
}

function renderGrid(filter = "") {
  const grid = document.getElementById("industryGrid");
  const lowerFilter = filter.toLowerCase();

  const filtered = DATA.filter(ind => {
    if (!lowerFilter) return true;
    if (ind.name.toLowerCase().includes(lowerFilter)) return true;
    if (ind.description.toLowerCase().includes(lowerFilter)) return true;
    return ind.resources.some(r => r.name.toLowerCase().includes(lowerFilter));
  });

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="big-icon">&#128269;</div>
        <h3>No matching industries</h3>
        <p>Try a different search term</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(ind => `
    <div class="industry-card ${activeIndustry === ind.id ? 'active' : ''}" onclick="selectIndustry('${ind.id}')">
      <div class="card-top">
        <div class="card-icon">${ind.icon}</div>
        <div class="card-title">${ind.name}</div>
      </div>
      <div class="card-meta">
        <span>&#128295; ${ind.resources.length} resources</span>
        <span>&#11088; ${ind.resources.filter(r => r.priority === 'essential').length} essential</span>
      </div>
    </div>
  `).join("");

  document.getElementById("industryCount").textContent = filtered.length;
}

function selectIndustry(id) {
  const panel = document.getElementById("detailPanel");

  if (activeIndustry === id) {
    activeIndustry = null;
    panel.classList.remove("visible");
    renderGrid(document.getElementById("searchInput").value);
    return;
  }

  activeIndustry = id;
  const ind = DATA.find(d => d.id === id);
  renderGrid(document.getElementById("searchInput").value);

  const priorityOrder = { essential: 0, common: 1, optional: 2 };
  const sorted = [...ind.resources].sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

  panel.innerHTML = `
    <div class="detail-header">
      <button class="close-btn" onclick="selectIndustry('${id}')">&times;</button>
      <h2>${ind.icon} ${ind.name}</h2>
      <p>${ind.description}</p>
    </div>
    <div class="detail-body">
      <div class="section-label">Resources &amp; Equipment</div>
      <div class="legend">
        <div class="legend-item"><span class="resource-tag tag-essential">Essential</span> Must-have for operations</div>
        <div class="legend-item"><span class="resource-tag tag-common">Common</span> Most businesses have</div>
        <div class="legend-item"><span class="resource-tag tag-optional">Optional</span> Premium add-on</div>
      </div>
      <div class="resource-grid">
        ${sorted.map(r => `
          <div class="resource-item">
            <div class="resource-icon">${r.icon}</div>
            <div>
              <div class="resource-name">${r.name}</div>
              <div class="resource-note">${r.note}</div>
              <span class="resource-tag tag-${r.priority}">${r.priority.charAt(0).toUpperCase() + r.priority.slice(1)}</span>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="talk-track">
        <h4>&#128172; Sales Talk Track</h4>
        <p>"${ind.talkTrack}"</p>
      </div>
    </div>
  `;

  panel.classList.add("visible");
  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// Search
document.getElementById("searchInput").addEventListener("input", (e) => {
  activeIndustry = null;
  document.getElementById("detailPanel").classList.remove("visible");
  renderGrid(e.target.value);
});

// Init
document.getElementById("resourceCount").textContent = getTotalResources();
renderGrid();
</script>
