<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresha Sales Operating System</title>
    <style>
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #e8856c 0%, #d964a7 18%, #c86dd1 35%, #a678e0 50%, #8b7ae8 65%, #7b8eef 80%, #5cc0c8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            padding: 40px;
        }
        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(10, 10, 15, 0.78);
            border-radius: 24px;
            padding: 40px 48px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 56px;
        }
        .header-logo {
            height: 36px;
            width: auto;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        /* Journey row */
        .journey-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .stage-group {
            display: flex;
            align-items: center;
        }
        .stage-box {
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .stage-box.active {
            transform: scale(1.05);
        }
        .stage-box:not(.active) {
            opacity: 0.7;
        }
        .stage-card {
            height: 72px;
            width: 148px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .stage-box.active .stage-card {
            border-color: rgba(108, 92, 231, 0.6);
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }
        .stage-num {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .stage-label {
            font-weight: 700;
            font-size: 13px;
        }
        .stage-short {
            font-size: 11px;
            letter-spacing: 0.25em;
            color: rgba(162, 155, 254, 0.5);
            margin-top: 8px;
            font-weight: 600;
        }
        .stage-box.active .stage-short {
            color: #a29bfe;
        }
        .connector {
            width: 20px;
            height: 2px;
            background: rgba(255,255,255,0.15);
            transition: background 0.3s ease;
        }
        .connector.passed {
            background: rgba(108, 92, 231, 0.5);
        }
        /* HubSpot Pipeline Overlay */
        .pipeline-overlay {
            margin-top: 28px;
            position: relative;
        }
        .pipeline-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .pipeline-header .hs-icon {
            width: 28px;
            height: 28px;
            background: #ff7a59;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }
        .pipeline-header span {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .pipeline-toggle {
            margin-left: auto;
            background: rgba(255,127,89,0.15);
            border: 1px solid rgba(255,127,89,0.25);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .pipeline-toggle:hover {
            background: rgba(255,127,89,0.25);
            color: white;
        }
        .pipeline-toggle.active {
            background: rgba(255,127,89,0.3);
            border-color: rgba(255,127,89,0.5);
            color: white;
        }
        .pipeline-lanes {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pipeline-lane-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            color: rgba(255,127,89,0.6);
            margin-bottom: 2px;
        }
        .pipeline-lane-label.deal-label {
            color: rgba(0,189,165,0.6);
        }
        .pipeline-track {
            display: flex;
            align-items: stretch;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid rgba(255,127,89,0.15);
            background: rgba(255,127,89,0.04);
        }
        .pipeline-track.deal-track {
            border-color: rgba(0,189,165,0.15);
            background: rgba(0,189,165,0.04);
        }
        .pipeline-phase {
            flex: 1;
            position: relative;
            min-width: 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .pipeline-phase-inner {
            padding: 10px 6px;
            text-align: center;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3px;
        }
        .pipeline-phase:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            height: 80%;
            width: 1px;
            background: rgba(255,255,255,0.06);
        }
        .pipeline-phase.active-phase {
            background: rgba(255,127,89,0.15);
        }
        .pipeline-track.deal-track .pipeline-phase.active-phase {
            background: rgba(0,189,165,0.15);
        }
        .pipeline-phase.active-phase .pipeline-phase-inner {
            border-top: 2px solid #ff7a59;
        }
        .pipeline-track.deal-track .pipeline-phase.active-phase .pipeline-phase-inner {
            border-top-color: #00bda5;
        }
        .pipeline-phase.exit-phase {
            max-width: 90px;
            opacity: 0.5;
        }
        .pipeline-phase.exit-phase .pipeline-phase-inner {
            background: rgba(255,255,255,0.02);
        }
        .pipeline-type-tag {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }
        .pipeline-type-tag.lead {
            color: #ff7a59;
            background: rgba(255,127,89,0.15);
        }
        .pipeline-type-tag.deal {
            color: #00bda5;
            background: rgba(0,189,165,0.15);
        }
        .pipeline-stage-name {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            line-height: 1.3;
        }
        .pipeline-phase.active-phase .pipeline-stage-name {
            color: white;
            font-weight: 700;
        }
        .pipeline-phase.passed-phase {
            opacity: 0.4;
        }
        .pipeline-auto {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            font-style: italic;
            line-height: 1.2;
        }
        .pipeline-detail-panel {
            margin-top: 12px;
            background: rgba(255,127,89,0.06);
            border: 1px solid rgba(255,127,89,0.12);
            border-radius: 10px;
            padding: 16px 20px;
            display: none;
        }
        .pipeline-detail-panel.show {
            display: block;
        }
        .pipeline-detail-title {
            font-size: 14px;
            font-weight: 700;
            color: #ff7a59;
            margin-bottom: 8px;
        }
        .pipeline-detail-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .pipeline-detail-col h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
            font-weight: 700;
        }
        .pipeline-detail-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .pipeline-detail-col li {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            line-height: 1.6;
            padding-left: 14px;
            position: relative;
        }
        .pipeline-detail-col li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,127,89,0.5);
        }
        .pipeline-detail-col.auto li::before {
            background: rgba(0,189,165,0.5);
        }
        @media (max-width: 1200px) {
            .pipeline-stage-name { font-size: 9px; }
            .pipeline-detail-cols { grid-template-columns: 1fr; }
            .pipeline-phase.exit-phase { max-width: 70px; }
        }
        @media (max-width: 768px) {
            .pipeline-track { flex-wrap: wrap; }
            .pipeline-phase { min-width: 33%; }
            .pipeline-phase.exit-phase { min-width: 33%; max-width: none; }
            .pipeline-phase:not(:last-child)::after { display: none; }
        }
        /* SWAP module removed */
        /* Breakdown panel */
        .breakdown {
            margin-top: 64px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }
        .info-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }
        .info-title {
            font-size: 42px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: -1px;
        }
        .info-short {
            color: #a29bfe;
            letter-spacing: 0.4em;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 600;
        }
        .info-desc {
            margin-top: 24px;
            color: rgba(255,255,255,0.6);
            max-width: 440px;
            line-height: 1.7;
            font-size: 15px;
        }
        .info-breakdown {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .breakdown-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
        }
        .breakdown-pill .pill-letter {
            font-weight: 800;
            color: #a29bfe;
            font-size: 15px;
        }
        .breakdown-pill .pill-word {
            color: rgba(255,255,255,0.85);
            font-weight: 500;
        }
        .info-goal {
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(108, 92, 231, 0.08);
            border-left: 3px solid #6c5ce7;
            border-radius: 0 8px 8px 0;
        }
        .goal-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #a29bfe;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .goal-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
        /* Tool preview */
        .tool-preview {
            grid-column: 1 / -1;
            margin-top: 16px;
            display: none;
        }
        .tool-preview.show {
            display: block;
        }
        .tool-card {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            max-width: 520px;
            margin-left: auto;
        }
        .tool-card-info {
            flex: 1;
        }
        .tool-card-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
        }
        .tool-card-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .tool-card-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }
        .tool-card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .tool-card-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.4);
        }
        .tool-card-link svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* Footer */
        .footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
        /* Responsive */
        @media (max-width: 1200px) {
            .journey-row { gap: 8px; }
            .stage-card { width: 130px; height: 70px; }
            .connector { width: 16px; }
            .breakdown { grid-template-columns: 1fr; gap: 32px; }
            .info-title { font-size: 32px; }
        }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .wrapper { padding: 24px 20px; border-radius: 16px; }
            .header { flex-direction: column; gap: 12px; margin-bottom: 32px; }
            .header h1 { font-size: 20px; }
            .journey-row { flex-wrap: wrap; gap: 8px; justify-content: center; }
            .stage-card { width: 100px; height: 60px; }
            .stage-label { font-size: 12px; }
            .stage-num { font-size: 10px; }
            .connector { display: none; }
            .info-title { font-size: 28px; }
            .tool-card { flex-direction: column; text-align: center; }
            .tool-card-link { width: 100%; justify-content: center; }
            .footer { flex-direction: column; gap: 8px; text-align: center; }
        }
        @media print {
            body { background: white; color: #2d3436; padding: 20px; }
            .wrapper { background: white; backdrop-filter: none; padding: 0; }
            .stage-card { border-color: #ddd; background: #f4f3f8 !important; color: #2d3436; }
            .stage-box.active .stage-card { background: #6c5ce7 !important; color: white; }
            .breakdown-card { border-color: #ddd; }
            .info-title, .card-name { color: #2d3436; }
        }
    </style>
</head>

                            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div>Fresha Sales Enablement — Core Training Programme</div>
            <div>7 stages. 1 operating system.</div>
        </div>
    </div>

    <script>
        const stages = [
            { label: "Preparation", short: "D.I.A.L", breakdown: ["Decide", "Intel", "Angle", "Land"], desc: "Plan every call with purpose. Know who you're calling, why, and what good looks like.", goal: "Walk into every call with a clear target, the right intel, a relevant angle, and a defined next step.", tool: "ct001-dial-planner.html", toolName: "CT001 — D.I.A.L Call Planner" },
            { label: "Open", short: "O.P.E.N", breakdown: ["Observe", "Position", "Engage", "Navigate"], desc: "Earn the right to a conversation. Lead with relevance, not a pitch.", goal: "Get the prospect talking within the first 30 seconds and earn permission to continue the conversation.", tool: "ct002-open-opener.html", toolName: "CT002 — O.P.E.N Opener Builder" },
            { label: "Discover", short: "4T", breakdown: ["Today", "Trouble", "True Cost", "Tomorrow"], desc: "Uncover the full picture. Move from surface symptoms to the real cost of inaction.", goal: "Quantify the gap between where they are now and where they want to be — in their own words.", tool: "ct003-4t-discovery.html", toolName: "CT003 — 4T Discovery Planner" },
            { label: "Demo", short: "P.A.I.N", breakdown: ["Prime", "Align", "Impact", "Next Step"], desc: "Demo with purpose. Connect every feature back to the problem they told you about.", goal: "Show only what matters to this prospect and get them to confirm Fresha solves their problem.", tool: "ct004-pain-demo.html", toolName: "CT004 — P.A.I.N Demo Planner" },
            { label: "Objection Handling", short: "E.A.S.E", breakdown: ["Empathise", "Assess", "Solve", "End"], desc: "Handle objections without fighting. Acknowledge, dig deeper, resolve, and move on.", goal: "Turn every objection into a deeper conversation that strengthens the case for change.", tool: "ct005-ease-objection.html", toolName: "CT005 — EASE Objection Handler" },
            { label: "Negotiate", short: "P.A.C.E", breakdown: ["Prepare", "Anchor", "Counter", "Engage"], desc: "Trade, don't cave. Lead with value, protect your position, and close with confidence.", goal: "Protect your price by trading value — never give a concession without getting something back.", tool: "ct006-pace-negotiation.html", toolName: "CT006 — PACE Negotiation Planner" },
            { label: "Close", short: "E.A.R.N", breakdown: ["Establish", "Affirm", "Recommend", "Next Steps"], desc: "You don't close a sale — you earn the decision. Read signals, affirm the gap, and secure commitment.", goal: "Secure a clear, time-bound commitment with a defined onboarding path.", tool: "ct007-earn-closing.html", toolName: "CT007 — EARN Closing Planner" },
        ];

        // SWAP module removed from this page

        // HubSpot Lead Workflow — each stage knows which sales stage it maps to
        const leadStages = [
            { stage: "New", salesIdx: 0, auto: "Auto-assigned by territory",
              youDo: ["Lead is assigned — no outreach yet", "Research the contact using D.I.A.L", "Goal: book a discovery meeting or conduct discovery on the spot (allow 30 min)"],
              hubspotDoes: ["Lead created in Sales Workspace", "When outreach begins (call/email), auto-moves to In Progress"] },
            { stage: "In Progress", salesIdx: 1, auto: "Auto on first outreach",
              youDo: ["Actively reaching out — not yet connected", "Use O.P.E.N to earn the right to a conversation", "If repeated attempts with no response, move to Cold with a reason"],
              hubspotDoes: ["When lead responds, auto-moves to Connected", "Auto-moves to Cold after 10+ attempts with no connection"] },
            { stage: "Connected", salesIdx: 2, auto: "Auto on call outcome",
              youDo: ["Lead has responded — qualification begins", "Complete the Qualification Playbook using 4T discovery", "Move lead to Qualified or Unqualified based on outcome"],
              hubspotDoes: ["Triggered when call outcome logged as Connected", "Based on playbook responses, auto-moves to Qualified or Unqualified"] },
            { stage: "Qualified", salesIdx: 3, auto: "Auto on playbook pass",
              youDo: ["Lead passed qualification criteria", "Create a deal using the Deal Creation Form"],
              hubspotDoes: ["Deal created and associated with lead", "Lifecycle Stage updated to Opportunity"] },
            { stage: "Unqualified", salesIdx: -1, exit: true, auto: "Exit stage",
              youDo: ["Provide a disqualification reason"],
              hubspotDoes: ["Lead categorised into a re-marketing segment"] },
            { stage: "Cold", salesIdx: -1, exit: true, auto: "Exit stage",
              youDo: ["Provide a cold reason explaining why the lead has gone cold"],
              hubspotDoes: ["Lead categorised into re-marketing segment", "Auto-moved to Cold after 10+ outreach attempts with no connection"] },
        ];

        // HubSpot Deal Pipeline — each stage knows which sales stage it maps to
        const dealStages = [
            { stage: "Full Demo Booked", salesIdx: 3, auto: "Deal created from qualified lead",
              youDo: ["Ensure Full Demo Meeting Date property is filled", "Add estimated close date", "If demo outcome is negative, move to Closed Lost with a reason"],
              hubspotDoes: ["Line items (subscription, terminal, setup) auto-added based on country/currency", "Full Demo Meeting Date updates automatically if meeting link changes"] },
            { stage: "Solution Proposed", salesIdx: 4, auto: "Manual move after demo",
              youDo: ["Move deal to Solution Proposed once you have shared your proposal with the prospect", "Update the Solution Proposed Date and expected Close Date", "Use E.A.S.E to handle any objections raised during the proposal review"],
              hubspotDoes: ["No automation at this stage"] },
            { stage: "VoC", salesIdx: 4, auto: "APAC enterprise only", note: true,
              youDo: ["Flag enterprise APAC deals where there are concerns about close likelihood"],
              hubspotDoes: ["No automation at this stage"] },
            { stage: "Invoice Sent", salesIdx: 5, auto: "Auto on Deal Manager invoice",
              youDo: ["Create deal in Deal Manager after solutions meeting", "Ensure contact has region, sub-region, and country code set", "Use P.A.C.E to negotiate terms and protect your price"],
              hubspotDoes: ["Auto-moves to Invoice Sent when Deal Manager invoice generated", "Deal locked until status update from Deal Manager", "If invoice cancelled, moves back to Solution Proposed Booked"] },
            { stage: "Package Purchased", salesIdx: 6, auto: "Auto on invoice payment",
              youDo: ["Confirm KYC Meeting Booked Date with new partner", "Complete BDM-to-PSS Handover task (login details, KYC, payments, terminals, photography)"],
              hubspotDoes: ["Auto-moves to Package Purchased when invoice paid", "Task generated for project preparation (5-day reminder)"] },
            { stage: "Handover to PSS", salesIdx: 6, auto: "Auto on task completion",
              youDo: ["PSS team reviews handover playbook details", "If rejected, redo handover task with correct info"],
              hubspotDoes: ["Task generated for PSS Lead to review handover", "5-day reminder if task not completed", "PSS moves deal to Closed Won or back to Project Prep"] },
            { stage: "Closed Won", salesIdx: 6, auto: "Moved by PSS",
              youDo: ["Deal successfully closed and onboarded"],
              hubspotDoes: ["Deal marked as won"] },
            { stage: "Closed Lost", salesIdx: -1, exit: true, auto: "Exit stage",
              youDo: ["Provide a closed lost reason"],
              hubspotDoes: ["Deal categorised for reporting"] },
        ];

        let pipelineVisible = true;
        let active = 0;

        function buildJourney() {
            const row = document.getElementById('journey-row');
            row.innerHTML = '';
            stages.forEach((s, i) => {
                const group = document.createElement('div');
                group.className = 'stage-group';

                const box = document.createElement('div');
                box.className = 'stage-box' + (i === active ? ' active' : '');
                box.onclick = () => selectStage(i);
                box.innerHTML = `
                    <div class="stage-card">
                        <div class="stage-num">${String(i + 1).padStart(2, '0')}</div>
                        <div class="stage-label">${s.label}</div>
                    </div>
                    <div class="stage-short">${s.short}</div>
                `;
                group.appendChild(box);

                if (i < stages.length - 1) {
                    const conn = document.createElement('div');
                    conn.className = 'connector' + (i < active ? ' passed' : '');
                    group.appendChild(conn);
                }

                row.appendChild(group);
            });
        }

        function updatePanel() {
            const current = stages[active];
            const letters = current.short.replace(/\./g, '');

            document.getElementById('info-label').textContent = `Stage ${String(active + 1).padStart(2, '0')}`;
            document.getElementById('info-title').textContent = current.label;
            document.getElementById('info-short').textContent = current.short;
            document.getElementById('info-desc').textContent = current.desc;

            // Build breakdown pills
            const breakdownEl = document.getElementById('info-breakdown');
            breakdownEl.innerHTML = '';
            current.breakdown.forEach((item, i) => {
                const pill = document.createElement('div');
                pill.className = 'breakdown-pill';
                pill.innerHTML = `<span class="pill-letter">${letters[i] || (i + 1)}</span><span class="pill-word">${item}</span>`;
                breakdownEl.appendChild(pill);
            });

            // Build goal
            const goalEl = document.getElementById('info-goal');
            if (current.goal) {
                goalEl.innerHTML = `<div class="goal-label">Goal</div><div class="goal-text">${current.goal}</div>`;
                goalEl.style.display = 'block';
            } else {
                goalEl.style.display = 'none';
            }

            // Update tool preview
            const preview = document.getElementById('tool-preview');
            if (current.tool) {
                preview.className = 'tool-preview show';
                document.getElementById('tool-name').textContent = current.toolName;
                document.getElementById('tool-link').href = current.tool;
            } else {
                preview.className = 'tool-preview';
            }
        }

        function selectStage(i) {
            active = i;
            buildJourney();
            updatePanel();
            buildPipeline();
            updatePipelineDetail();
        }

        // SWAP removed

        function buildPipelineLane(trackId, stagesData, type) {
            const track = document.getElementById(trackId);
            track.innerHTML = '';
            stagesData.forEach((p) => {
                const phase = document.createElement('div');
                let cls = 'pipeline-phase';
                if (p.exit) cls += ' exit-phase';
                if (p.salesIdx === active) cls += ' active-phase';
                else if (!p.exit && p.salesIdx >= 0 && p.salesIdx < active) cls += ' passed-phase';
                phase.className = cls;
                if (!p.exit && p.salesIdx >= 0) {
                    phase.onclick = () => selectStage(p.salesIdx);
                }
                phase.innerHTML = `
                    <div class="pipeline-phase-inner">
                        <div class="pipeline-stage-name">${p.stage}</div>
                        <div class="pipeline-auto">${p.auto}</div>
                    </div>
                `;
                track.appendChild(phase);
            });
        }

        function buildPipeline() {
            buildPipelineLane('pipeline-lead-track', leadStages, 'lead');
            buildPipelineLane('pipeline-deal-track', dealStages, 'deal');
        }

        function updatePipelineDetail() {
            const panel = document.getElementById('pipeline-detail');
            // Show detail for current stage
            // Gather all active HubSpot stages for the current sales stage
            const activeLeads = leadStages.filter(s => s.salesIdx === active);
            const activeDeals = dealStages.filter(s => s.salesIdx === active);
            const allActive = [...activeLeads.map(s => ({...s, type: 'Lead'})), ...activeDeals.map(s => ({...s, type: 'Deal'}))];

            if (allActive.length === 0) {
                panel.className = 'pipeline-detail-panel';
                return;
            }

            panel.className = 'pipeline-detail-panel show';
            panel.innerHTML = allActive.map(p => `
                <div style="margin-bottom: ${allActive.length > 1 ? '16px' : '0'};">
                    <div class="pipeline-detail-title">
                        <span class="pipeline-type-tag ${p.type === 'Lead' ? 'lead' : 'deal'}">${p.type}</span>
                        ${p.stage}${p.note ? ' <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:400;">(APAC enterprise only)</span>' : ''}
                    </div>
                    <div class="pipeline-detail-cols">
                        <div class="pipeline-detail-col">
                            <h4>What you do</h4>
                            <ul>${p.youDo.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                        <div class="pipeline-detail-col auto">
                            <h4>What HubSpot does</h4>
                            <ul>${p.hubspotDoes.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function togglePipeline() {
            pipelineVisible = !pipelineVisible;
            const container = document.getElementById('pipeline-container');
            const btn = document.getElementById('pipeline-toggle');
            container.style.display = pipelineVisible ? 'block' : 'none';
            btn.textContent = pipelineVisible ? 'Visible' : 'Hidden';
            btn.className = 'pipeline-toggle' + (pipelineVisible ? ' active' : '');
        }

        // Init
        buildJourney();
        updatePanel();
        buildPipeline();
        updatePipelineDetail();
    </script>
</body>
</html>
